<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figuritas App - Usa Méx Can 26</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --missing-color: #ff4757;
            --have-color: #2ed573;
            --accent-color: #3742fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 80px;
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #aaa;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .stats {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.1em;
            background-color: #222;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            line-height: 1.6;
        }

        .team-section {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .team-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .stickers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
        }

        .sticker {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s, background-color 0.2s;
        }

        .sticker:active {
            transform: scale(0.9);
        }

        /* Estado: Falta (Rojo) */
        .sticker.missing {
            background-color: transparent;
            border: 2px solid var(--missing-color);
            color: var(--missing-color);
        }

        /* Estado: La tengo (Verde) */
        .sticker.have {
            background-color: var(--have-color);
            border: 2px solid var(--have-color);
            color: #000;
        }

        .floating-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .floating-btn:active {
            background-color: #2f35cc;
        }
    </style>
</head>
<body>

    <h1>Figuritas App</h1>
    <p class="subtitle">Usa Méx Can 26</p>

    <div class="stats" id="stats">
        Cargando progreso...
    </div>

    <div id="album-container"></div>

    <button class="floating-btn" onclick="exportMissingList()">📋 Copiar Lista de Faltantes</button>

    <script>
        // Lista estructurada de equipos con todos los faltantes agregados en orden
        const teams = [
            { id: 'fwc_1', label: 'FWC (1-8)', start: 1, end: 8 },
            { id: 'mex', label: 'MEX' },
            { id: 'rsa', label: 'RSA' },
            { id: 'kor', label: 'KOR' },
            { id: 'cze', label: 'CZE' },
            { id: 'can', label: 'CAN' },
            { id: 'bih', label: 'BIH' },
            { id: 'qat', label: 'QAT' },
            { id: 'sui', label: 'SUI' },
            { id: 'bra', label: 'BRA' }, // Agregado
            { id: 'mar', label: 'MAR' },
            { id: 'hai', label: 'HAI' },
            { id: 'sco', label: 'SCO' },
            { id: 'usa', label: 'USA' },
            { id: 'par', label: 'PAR' },
            { id: 'aus', label: 'AUS' },
            { id: 'tur', label: 'TUR' },
            { id: 'ger', label: 'GER' },
            { id: 'cuw', label: 'CUW' },
            { id: 'civ', label: 'CIV' }, // Agregado
            { id: 'ecu', label: 'ECU' },
            { id: 'ned', label: 'NED' },
            { id: 'jpn', label: 'JPN' },
            { id: 'swe', label: 'SWE' },
            { id: 'tun', label: 'TUN' },
            { id: 'bel', label: 'BEL' },
            { id: 'egy', label: 'EGY' },
            { id: 'irn', label: 'IRN' }, // Agregado
            { id: 'nzl', label: 'NZL' },
            { id: 'esp', label: 'ESP' },
            { id: 'cpv', label: 'CPV' },
            { id: 'ksa', label: 'KSA' },
            { id: 'uru', label: 'URU' }, // Agregado
            { id: 'fra', label: 'FRA' },
            { id: 'sen', label: 'SEN' },
            { id: 'irq', label: 'IRQ' },
            { id: 'nor', label: 'NOR' },
            { id: 'arg', label: 'ARG' },
            { id: 'alg', label: 'ALG' },
            { id: 'aut', label: 'AUT' },
            { id: 'jor', label: 'JOR' },
            { id: 'por', label: 'POR' },
            { id: 'cod', label: 'COD' },
            { id: 'uzb', label: 'UZB' },
            { id: 'col', label: 'COL' },
            { id: 'eng', label: 'ENG' }, // Agregado
            { id: 'cro', label: 'CRO' },
            { id: 'gha', label: 'GHA' },
            { id: 'pan', label: 'PAN' },
            { id: 'fwc_2', label: 'FWC (9-19)', start: 9, end: 19 },
            { id: 'cc', label: 'CC (Vaso)' }
        ];

        let albumData = JSON.parse(localStorage.getItem('albumData2026')) || {};

        function initApp() {
            const container = document.getElementById('album-container');
            container.innerHTML = '';

            teams.forEach(team => {
                const section = document.createElement('div');
                section.className = 'team-section';

                const title = document.createElement('div');
                title.className = 'team-title';
                
                const grid = document.createElement('div');
                grid.className = 'stickers-grid';

                let teamMissingCount = 0;
                const start = team.start || 1;
                const end = team.end || 20;

                for (let i = start; i <= end; i++) {
                    const stickerId = `${team.id}_${i}`;
                    const sticker = document.createElement('div');
                    sticker.innerText = i;
                    
                    const isHave = albumData[stickerId] === true;
                    sticker.className = `sticker ${isHave ? 'have' : 'missing'}`;
                    
                    if (!isHave) teamMissingCount++;

                    sticker.onclick = () => toggleSticker(sticker, stickerId);
                    
                    grid.appendChild(sticker);
                }

                title.innerHTML = `<span>${team.label}</span> <span id="count_${team.id}" style="font-size:0.8em; color:#aaa;">Faltan: ${teamMissingCount}</span>`;

                section.appendChild(title);
                section.appendChild(grid);
                container.appendChild(section);
            });

            updateStats();
        }

        function toggleSticker(element, stickerId) {
            if (element.classList.contains('missing')) {
                element.classList.remove('missing');
                element.classList.add('have');
                albumData[stickerId] = true;
            } else {
                element.classList.remove('have');
                element.classList.add('missing');
                albumData[stickerId] = false;
            }

            localStorage.setItem('albumData2026', JSON.stringify(albumData));
            
            const teamId = stickerId.substring(0, stickerId.lastIndexOf('_'));
            updateTeamCounter(teamId); 
            updateStats();
        }

        function updateTeamCounter(teamId) {
            const team = teams.find(t => t.id === teamId);
            if (!team) return;
            
            const start = team.start || 1;
            const end = team.end || 20;
            
            let missingCount = 0;
            for (let i = start; i <= end; i++) {
                if (!albumData[`${teamId}_${i}`]) {
                    missingCount++;
                }
            }
            const countLabel = document.getElementById(`count_${teamId}`);
            if(countLabel) countLabel.innerText = `Faltan: ${missingCount}`;
        }

        function updateStats() {
            let totalStickers = 0;
            let totalHave = 0;

            teams.forEach(team => {
                const start = team.start || 1;
                const end = team.end || 20;
                totalStickers += (end - start + 1);

                for (let i = start; i <= end; i++) {
                    if (albumData[`${team.id}_${i}`] === true) {
                        totalHave++;
                    }
                }
            });

            let totalMissing = totalStickers - totalHave;
            let percentage = ((totalHave / totalStickers) * 100).toFixed(1);

            document.getElementById('stats').innerHTML = 
                `<div><strong>Llenadas:</strong> <span style="color:var(--have-color)">${totalHave}</span> / <strong>Total:</strong> ${totalStickers}</div>
                 <div><strong>Faltantes:</strong> <span style="color:var(--missing-color)">${totalMissing}</span></div>
                 <div style="margin-top: 5px; font-size: 1.2em;"><strong>Llenado:</strong> <span style="color:var(--have-color)">${percentage}%</span></div>`;
        }

        function exportMissingList() {
            let textToExport = "Figuritas App - Lista\nUsa Méx Can 26\nMe faltan\n\n";
            
            teams.forEach(team => {
                let missingNumbers = [];
                const start = team.start || 1;
                const end = team.end || 20;

                for (let i = start; i <= end; i++) {
                    if (!albumData[`${team.id}_${i}`]) {
                        missingNumbers.push(i);
                    }
                }
                
                if (missingNumbers.length > 0) {
                    let cleanLabel = team.label.split(' ')[0];
                    textToExport += `${cleanLabel}: ${missingNumbers.join(', ')}\n`;
                }
            });

            navigator.clipboard.writeText(textToExport).then(() => {
                alert("¡Lista copiada al portapapeles! Ya puedes pegarla en WhatsApp o tus notas.");
            }).catch(err => {
                console.error("Error al copiar: ", err);
                alert("Hubo un error al copiar la lista.");
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
